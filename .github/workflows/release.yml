name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build dashboard
        run: |
          cd dashboard
          npm ci
          npm run build
          # Flatten standalone into dashboard-dist/ for simple distribution
          mkdir -p ../dashboard-dist
          cp -r .next/standalone/* ../dashboard-dist/
          mkdir -p ../dashboard-dist/.next
          cp -r .next/static ../dashboard-dist/.next/static
          cp -r public ../dashboard-dist/public
          # Create marker file for detection
          echo "standalone" > ../dashboard-dist/.idops-dashboard

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
