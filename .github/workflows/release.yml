name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build dashboard
        run: |
          cd dashboard
          npm ci
          npm run build
          # Flatten standalone into dashboard-dist/
          mkdir -p ../dashboard-dist
          # Copy ALL files including dotfiles (.next) from standalone
          cp -a .next/standalone/. ../dashboard-dist/
          # Merge static assets into the .next dir
          cp -r .next/static ../dashboard-dist/.next/static
          # Copy public assets
          cp -r public ../dashboard-dist/public 2>/dev/null || true
          # Verify critical files exist
          echo "=== Verifying dashboard-dist ==="
          ls -la ../dashboard-dist/
          ls -la ../dashboard-dist/.next/ || echo "FATAL: .next missing"
          test -f ../dashboard-dist/server.js || { echo "FATAL: server.js missing"; exit 1; }
          # Create marker
          echo "standalone" > ../dashboard-dist/.idops-dashboard

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
